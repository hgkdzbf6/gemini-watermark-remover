<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raphael Watermark Remover - Test Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .drop-zone {
      border: 2px dashed #cbd5e0;
      transition: all 0.3s;
    }
    .drop-zone.drag-over {
      border-color: #4299e1;
      background-color: #ebf8ff;
    }
    .image-container {
      max-width: 100%;
      max-height: 600px;
      object-fit: contain;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div class="container mx-auto px-4 py-8 max-w-6xl">
    <header class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">Raphael Watermark Remover</h1>
      <p class="text-gray-600">Test page for removing raphael.app watermarks</p>
    </header>

    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
      <h2 class="text-2xl font-semibold mb-4">Upload Image</h2>
      
      <div id="dropZone" class="drop-zone rounded-lg p-12 text-center cursor-pointer">
        <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" stroke="currentColor" fill="none" viewBox="0 0 48 48">
          <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <p class="text-lg text-gray-600 mb-2">Drop image here or click to select</p>
        <p class="text-sm text-gray-400">Supports PNG, JPG, WEBP</p>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <div class="mt-4 space-y-2">
        <label class="flex items-center space-x-2">
          <input type="checkbox" id="autoDetect" checked class="rounded">
          <span class="text-sm text-gray-700">Auto-detect watermark position</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" id="multiPass" checked class="rounded">
          <span class="text-sm text-gray-700">Multi-pass removal (stronger)</span>
        </label>
      </div>
    </div>

    <div id="resultsSection" class="hidden">
      <div class="grid md:grid-cols-2 gap-6 mb-6">
        <div class="bg-white rounded-lg shadow-lg p-6">
          <h3 class="text-xl font-semibold mb-4">Original Image</h3>
          <div class="border rounded-lg overflow-hidden bg-gray-100">
            <img id="originalImage" class="image-container w-full" alt="Original">
          </div>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
          <h3 class="text-xl font-semibold mb-4">Processed Image</h3>
          <div class="border rounded-lg overflow-hidden bg-gray-100">
            <img id="processedImage" class="image-container w-full" alt="Processed">
          </div>
          <button id="downloadBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
            Download Processed Image
          </button>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-lg p-6">
        <h3 class="text-xl font-semibold mb-4">Processing Info</h3>
        <div id="processingInfo" class="space-y-2 text-sm font-mono bg-gray-50 p-4 rounded"></div>
      </div>
    </div>

    <div id="loadingIndicator" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-8 text-center">
        <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <p class="text-lg font-semibold">Processing image...</p>
      </div>
    </div>
  </div>

  <script type="module">
    // Import Raphael watermark engine from built module
    let RaphaelWatermarkEngine;
    
    try {
      const module = await import('./raphael-watermark-remover.js');
      RaphaelWatermarkEngine = module.RaphaelWatermarkEngine;
      console.log('✅ Raphael module loaded successfully');
    } catch (error) {
      console.error('❌ Failed to load Raphael module:', error);
      alert('Failed to load watermark removal module. Please check console for details.\n\nMake sure the dev server is running: pnpm dev');
    }

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const resultsSection = document.getElementById('resultsSection');
    const originalImage = document.getElementById('originalImage');
    const processedImage = document.getElementById('processedImage');
    const processingInfo = document.getElementById('processingInfo');
    const downloadBtn = document.getElementById('downloadBtn');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const autoDetectCheckbox = document.getElementById('autoDetect');
    const multiPassCheckbox = document.getElementById('multiPass');

    let processedCanvas = null;

    // Drag and drop handlers
    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleImageFile(file);
      }
    });
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        handleImageFile(file);
      }
    });

    async function handleImageFile(file) {
      if (!RaphaelWatermarkEngine) {
        alert('Watermark removal module not loaded. Please refresh the page.');
        return;
      }
      
      loadingIndicator.classList.remove('hidden');
      
      try {
        console.log('📸 Loading image:', file.name);
        
        // Load image
        const img = await loadImage(file);
        originalImage.src = img.src;
        console.log('✅ Image loaded:', img.width, 'x', img.height);
        
        // Process image
        console.log('🔧 Creating engine...');
        const engine = await RaphaelWatermarkEngine.create();
        console.log('✅ Engine created');
        
        const startTime = performance.now();
        console.log('🎨 Processing image...');
        
        processedCanvas = await engine.removeWatermarkFromImage(img, {
          autoDetect: autoDetectCheckbox.checked,
          multiPass: multiPassCheckbox.checked,
          maxPasses: 3
        });
        
        const endTime = performance.now();
        const processingTime = (endTime - startTime).toFixed(2);
        console.log('✅ Processing complete in', processingTime, 'ms');
        console.log('📦 Canvas type:', processedCanvas.constructor.name);
        console.log('📦 Has toDataURL:', typeof processedCanvas.toDataURL);
        
        // Display processed image
        if (typeof processedCanvas.toDataURL === 'function') {
          processedImage.src = processedCanvas.toDataURL();
        } else {
          // Fallback for OffscreenCanvas
          const blob = await processedCanvas.convertToBlob();
          processedImage.src = URL.createObjectURL(blob);
        }
        
        // Show results
        resultsSection.classList.remove('hidden');
        
        // Display processing info
        const meta = processedCanvas.__watermarkMeta;
        processingInfo.innerHTML = `
          <div><strong>Processing Time:</strong> ${processingTime}ms</div>
          <div><strong>Image Size:</strong> ${img.width}x${img.height}</div>
          <div><strong>Watermark Type:</strong> ${meta.type}</div>
          <div><strong>Position:</strong> x=${meta.position.x}, y=${meta.position.y}, w=${meta.position.width}, h=${meta.position.height}</div>
          <div><strong>Watermark Color:</strong> ${meta.watermarkColor}</div>
          <div><strong>Detection Confidence:</strong> ${meta.detection?.confidence?.toFixed(2) || 'N/A'}</div>
          <div><strong>Auto-detected:</strong> ${meta.detection?.detected ? 'Yes' : 'No'}</div>
        `;
        
        console.log('📊 Processing metadata:', meta);
        
      } catch (error) {
        console.error('❌ Error processing image:', error);
        alert('Error processing image: ' + error.message + '\n\nCheck console for details.');
      } finally {
        loadingIndicator.classList.add('hidden');
      }
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    downloadBtn.addEventListener('click', async () => {
      if (!processedCanvas) return;
      
      try {
        let blob;
        if (typeof processedCanvas.toBlob === 'function') {
          // Standard HTMLCanvasElement
          blob = await new Promise((resolve) => {
            processedCanvas.toBlob(resolve);
          });
        } else if (typeof processedCanvas.convertToBlob === 'function') {
          // OffscreenCanvas
          blob = await processedCanvas.convertToBlob();
        } else {
          throw new Error('Cannot convert canvas to blob');
        }
        
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'raphael-watermark-removed.png';
        a.click();
        URL.revokeObjectURL(url);
      } catch (error) {
        console.error('Download error:', error);
        alert('Failed to download image: ' + error.message);
      }
    });
  </script>
</body>
</html>
